<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OK Quest Admin</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a href="/" class="brand">OK Quest</a>
      <span>Parent Admin</span>
    </header>
    <main class="panel admin-panel">
      <h1>Parent Admin Screen</h1>
      <p>Write the prizes before the game starts. The host screen will show the top prize from the beginning so everyone knows what they are playing for.</p>

      <form id="rewardsForm" class="admin-form">
        <label>1st Place Prize Avatar
          <input id="avatar1" placeholder="Example: Trophy, Crown, Chocolate">
        </label>
        <label>1st Place / Highest Points Prize
          <input id="reward1" placeholder="Example: 2 chocolates + 2 hours phone time">
        </label>
        <label>2nd Place Prize Avatar
          <input id="avatar2" placeholder="Example: Medal, Silver, Treat">
        </label>
        <label>2nd Place Prize
          <input id="reward2" placeholder="Example: 1 chocolate + 1 hour phone time">
        </label>
        <label>3rd Place Prize Avatar
          <input id="avatar3" placeholder="Example: Star, Dessert, Fun">
        </label>
        <label>3rd Place Prize
          <input id="reward3" placeholder="Example: Choose dessert or family activity">
        </label>
        <button class="button primary" type="submit">Save Prizes</button>
        <a class="button" href="/host.html">Create Game</a>
      </form>

      <p id="adminMessage" class="message"></p>
    </main>
    <script src="/admin.js"></script>
  </body>
</html>
